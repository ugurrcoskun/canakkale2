name: Yemek Scraper

on:
  schedule:
    # Her ayın 1'i 03:30 UTC = 06:30 TR (UTC+3)
    - cron: "30 3 1 * *"
  workflow_dispatch: # Elle de tetiklenebilir

permissions:
  contents: write

jobs:
  scrape-meal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout reposu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bağımlılıkları kur
        run: pip install requests beautifulsoup4

      - name: Yemek scraper'ı çalıştır
        run: python scraper.py --target meal

      - name: Değişiklik var mı kontrol et
        id: check
        run: |
          if ! git diff --quiet -- data/yemek.json; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Değişiklikleri commit ve push yap
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/yemek.json
          git commit -m "chore: yemek verisi güncellendi [$(date -u +'%Y-%m-%d')]"
          git push
