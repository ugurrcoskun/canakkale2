<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../style.css">
  <title>Çanakkale - Yemek</title>


  <!-- Diğer stil ve script bağlantıları -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <style>
    body.yemek-page {
      min-height: 100vh;
      align-items: flex-start;
      justify-content: flex-start;
      overflow-y: auto;
      padding: 24px 16px 32px;
      box-sizing: border-box;
    }

    .page-shell {
      width: min(920px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .links-panel {
      display: flex;
      flex-direction: column;
      gap: 0;
      align-items: stretch;
    }

    .menu-panel {
      animation: fade-up 0.5s ease both;
    }

    .menu-panel__title {
      margin: 0;
    }

    .menu-panel__actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-date-tools {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .menu-date-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .menu-date-input {
      min-width: 220px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 14px;
    }

    .menu-date-input::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.85;
      cursor: pointer;
    }

    .menu-date-btn {
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 10px;
      color: #fff;
      background: rgba(255, 255, 255, 0.08);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .menu-date-btn:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .menu-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 999px;
      color: #fff;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .menu-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.14);
      color: #fff;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 720px) {
      body.yemek-page {
        padding: 16px 10px 24px;
      }

      .menu-panel {
        padding: 18px;
        border-radius: 20px;
      }

      .menu-date-tools {
        align-items: stretch;
      }

      .menu-date-label,
      .menu-date-input,
      .menu-date-btn {
        width: 100%;
      }

      .menu-date-input,
      .menu-date-btn {
        min-width: 0;
      }
    }
  </style>


</head>

<body class="yemek-page">
  <img src="../resimler/skule.png" alt="Çanakkale" class="background-img" loading="eager" />

  <main class="page-shell">
    <section class="menu-panel">
      <div class="menu-panel__eyebrow">Günlük yemekler</div>
      <h1 class="menu-panel__title">ÖSEM ve KYK menüsü</h1>
      <p class="menu-panel__meta" id="menu-status">Güncel menü yükleniyor...</p>
      <div class="menu-date-tools">
        <label class="menu-date-label" for="menu-date-picker">Gün seç</label>
        <input class="menu-date-input" id="menu-date-picker" type="date" />
        <button class="menu-date-btn" id="menu-date-today" type="button">Bugün</button>
      </div>
      <div class="menu-grid" id="menu-grid"></div>
      <div class="menu-panel__actions">
        <a class="menu-link" href="https://yemek.comu.edu.tr/" target="_blank" rel="noopener noreferrer">ÖSEM kaynağı</a>
        <a class="menu-link" href="https://yurtmenu.net/canakkale" target="_blank" rel="noopener noreferrer">KYK kaynağı</a>
        <a class="menu-link" href="kyk-foto.html">KYK foto</a>
      </div>
    </section>

  </main>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const menuGrid = document.getElementById("menu-grid");
      const menuStatus = document.getElementById("menu-status");
      const menuDatePicker = document.getElementById("menu-date-picker");
      const menuDateTodayButton = document.getElementById("menu-date-today");
      const menuDataUrl = "../data/yemek.json";
      let loadedMenuData = null;
      let availableDates = [];

      function getIstanbulTodayIso() {
        return new Intl.DateTimeFormat("en-CA", {
          timeZone: "Europe/Istanbul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date());
      }

      function getDayData(source, isoDate) {
        const days = source?.monthly?.days || {};
        return days[isoDate] || null;
      }

      function normalizeAvailableDates(data) {
        const set = new Set();
        Object.keys(data?.osem?.monthly?.days || {}).forEach((d) => set.add(d));
        Object.keys(data?.kyk?.monthly?.days || {}).forEach((d) => set.add(d));
        return Array.from(set).sort();
      }

      function createMenuCard({ accentClass, tag, date, items, calories }) {
        const card = document.createElement("article");
        card.className = `menu-card ${accentClass}`;

        const tagElement = document.createElement("div");
        tagElement.className = "menu-card__tag";
        tagElement.textContent = tag;

        const dateElement = document.createElement("h2");
        dateElement.className = "menu-card__date";
        dateElement.textContent = date || "Bugün";

        const list = document.createElement("ul");
        list.className = "menu-card__list";

        if (items.length === 0) {
          const empty = document.createElement("li");
          empty.textContent = "Veri bulunamadı.";
          list.appendChild(empty);
        } else {
          items.forEach((item) => {
            const li = document.createElement("li");
            li.textContent = item;
            list.appendChild(li);
          });
        }

        card.appendChild(tagElement);
        card.appendChild(dateElement);
        card.appendChild(list);

        if (calories) {
          const footer = document.createElement("div");
          footer.className = "menu-card__footer";
          footer.textContent = calories;
          card.appendChild(footer);
        }

        return card;
      }

      function renderForDate(isoDate) {
        if (!loadedMenuData || !menuGrid || !menuStatus) {
          return;
        }

        const data = loadedMenuData;
        const osemDay = getDayData(data.osem, isoDate);
        const kykDay = getDayData(data.kyk, isoDate);

        const osem = osemDay || {
          date: data?.osem?.date || "",
          items: data?.osem?.items || [],
        };

        const kykSabah = (kykDay && kykDay.sabah) || {
          date: data?.kyk?.sabah?.date || "",
          items: data?.kyk?.sabah?.items || [],
          calories: data?.kyk?.sabah?.calories || "",
        };

        const kykAksam = (kykDay && kykDay.aksam) || {
          date: data?.kyk?.aksam?.date || "",
          items: data?.kyk?.aksam?.items || [],
          calories: data?.kyk?.aksam?.calories || "",
        };

        const cards = [
          createMenuCard({
            accentClass: "menu-card--osem",
            tag: "ÖSEM",
            date: osem.date,
            items: osem.items || [],
            calories: "",
          }),
          createMenuCard({
            accentClass: "menu-card--sabah",
            tag: "KYK Sabah",
            date: kykSabah.date,
            items: kykSabah.items || [],
            calories: kykSabah.calories || "",
          }),
          createMenuCard({
            accentClass: "menu-card--aksam",
            tag: "KYK Akşam",
            date: kykAksam.date,
            items: kykAksam.items || [],
            calories: kykAksam.calories || "",
          }),
        ];

        menuGrid.innerHTML = "";
        cards.forEach((card) => menuGrid.appendChild(card));

        const lastUpdated = data.generatedAt ? new Date(data.generatedAt) : null;
        const updatedText = lastUpdated && !Number.isNaN(lastUpdated.getTime())
          ? `Son güncelleme: ${lastUpdated.toLocaleString("tr-TR")}`
          : "Güncel menü yüklendi.";
        menuStatus.textContent = `${isoDate} - ${updatedText}`;
      }

      async function loadMenu() {
        if (!menuGrid || !menuStatus || !menuDatePicker || !menuDateTodayButton) {
          return;
        }

        try {
          const response = await fetch(menuDataUrl, { cache: "no-store" });
          if (!response.ok) {
            throw new Error("Menü dosyası alınamadı");
          }

          loadedMenuData = await response.json();
          availableDates = normalizeAvailableDates(loadedMenuData);

          const todayIso = getIstanbulTodayIso();
          const initialDate = availableDates.includes(todayIso)
            ? todayIso
            : (availableDates[0] || todayIso);

          if (availableDates.length > 0) {
            menuDatePicker.min = availableDates[0];
            menuDatePicker.max = availableDates[availableDates.length - 1];
          }

          menuDatePicker.value = initialDate;
          renderForDate(initialDate);

          menuDatePicker.addEventListener("change", () => {
            const selected = menuDatePicker.value;
            if (!selected) {
              return;
            }
            renderForDate(selected);
          });

          menuDateTodayButton.addEventListener("click", () => {
            const today = getIstanbulTodayIso();
            const selected = availableDates.includes(today)
              ? today
              : (availableDates[0] || today);
            menuDatePicker.value = selected;
            renderForDate(selected);
          });
        } catch (error) {
          console.error("Menü verisi alınamadı:", error);
          menuGrid.innerHTML = "<div class='menu-empty'>Günlük menü şu anda yüklenemedi. Kaynak bağlantıları alttan açık.</div>";
          menuStatus.textContent = "Veri alınamadı.";
        }
      }

      loadMenu();
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"></script>
</body>

</html>
